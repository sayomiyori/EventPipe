services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 40s
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 \
          --topic events.raw --partitions 3 --replication-factor 1
        echo "Topic events.raw ready."
    restart: "no"

  ingest_service:
    build:
      context: .
      dockerfile: ingest_service/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    ports:
      - "8013:8013"
      - "50051:50051"
    environment:
      EVENTPIPE_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EVENTPIPE_KAFKA_TOPIC_RAW: events.raw
      EVENTPIPE_API_HOST: 0.0.0.0
      EVENTPIPE_API_PORT: 8013
      EVENTPIPE_GRPC_HOST: 0.0.0.0
      EVENTPIPE_GRPC_PORT: 50051
