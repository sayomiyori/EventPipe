services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 40s
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 \
          --topic events.raw --partitions 3 --replication-factor 1
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 \
          --topic events.dlq --partitions 1 --replication-factor 1
        echo "Kafka topics events.raw, events.dlq ready."
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eventpipe
      POSTGRES_PASSWORD: eventpipe
      POSTGRES_DB: eventpipe
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventpipe -d eventpipe"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for i in $$(seq 1 40); do
          mc alias set local http://minio:9000 minio minio12345 && break
          sleep 2
        done
        mc mb --ignore-existing local/raw-events
        echo "MinIO bucket raw-events ready."
    restart: "no"

  ingest_service:
    build:
      context: .
      dockerfile: ingest_service/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    ports:
      - "8013:8013"
      - "50051:50051"
    environment:
      EVENTPIPE_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EVENTPIPE_KAFKA_TOPIC_RAW: events.raw
      EVENTPIPE_API_HOST: 0.0.0.0
      EVENTPIPE_API_PORT: 8013
      EVENTPIPE_GRPC_HOST: 0.0.0.0
      EVENTPIPE_GRPC_PORT: 50051
    labels:
      - "prometheus.job=ingest_service"

  transform_service:
    build:
      context: .
      dockerfile: transform_service/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      TRANSFORM_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TRANSFORM_KAFKA_TOPIC_RAW: events.raw
      TRANSFORM_KAFKA_TOPIC_DLQ: events.dlq
      TRANSFORM_KAFKA_GROUP_ID: transform-workers
      TRANSFORM_DATABASE_URL: postgresql+asyncpg://eventpipe:eventpipe@postgres:5432/eventpipe
      TRANSFORM_MINIO_ENDPOINT_URL: http://minio:9000
      TRANSFORM_MINIO_ACCESS_KEY: minio
      TRANSFORM_MINIO_SECRET_KEY: minio12345
      TRANSFORM_MINIO_BUCKET_RAW: raw-events
      TRANSFORM_HEALTH_HOST: 0.0.0.0
      TRANSFORM_HEALTH_PORT: 9101
    ports:
      - "9101:9101"

  query_service:
    build:
      context: .
      dockerfile: query_service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    ports:
      - "8020:8020"
    environment:
      QUERY_API_HOST: 0.0.0.0
      QUERY_API_PORT: 8020
      QUERY_DATABASE_URL: postgresql+asyncpg://eventpipe:eventpipe@postgres:5432/eventpipe
      QUERY_MINIO_ENDPOINT_URL: http://minio:9000
      QUERY_MINIO_PUBLIC_URL: http://localhost:9000
      QUERY_MINIO_ACCESS_KEY: minio
      QUERY_MINIO_SECRET_KEY: minio12345
      QUERY_MINIO_BUCKET_RAW: raw-events
      QUERY_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QUERY_KAFKA_TOPIC_DLQ: events.dlq

  prometheus:
    image: prom/prometheus:v2.53.0
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9095:9090"
    depends_on:
      - ingest_service
      - transform_service
      - query_service

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
