apiVersion: apps/v1
kind: Deployment
metadata:
  name: transform
  namespace: eventpipe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transform
  template:
    metadata:
      labels:
        app: transform
    spec:
      containers:
        - name: transform
          image: eventpipe-transform:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9101
              name: http
          env:
            - name: TRANSFORM_DATABASE_URL
              value: "postgresql+asyncpg://eventpipe:$(POSTGRES_PASSWORD)@postgres:5432/eventpipe"
          envFrom:
            - configMapRef:
                name: eventpipe-config
            - secretRef:
                name: eventpipe-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
