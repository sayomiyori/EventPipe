apiVersion: apps/v1
kind: Deployment
metadata:
  name: query
  namespace: eventpipe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query
  template:
    metadata:
      labels:
        app: query
    spec:
      containers:
        - name: query
          image: eventpipe-query:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
              name: http
          env:
            - name: QUERY_DATABASE_URL
              value: "postgresql+asyncpg://eventpipe:$(POSTGRES_PASSWORD)@postgres:5432/eventpipe"
            - name: QUERY_MINIO_ENDPOINT_URL
              value: "http://minio:9000"
            - name: QUERY_MINIO_PUBLIC_URL
              value: "http://minio:9000"
          envFrom:
            - configMapRef:
                name: eventpipe-config
            - secretRef:
                name: eventpipe-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
